databases:
  - name: prominence-db
    plan: free
    databaseName: prominence_bank
    user: prominence

services:
  - type: web
    name: prominence-bank-api
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prominence-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://prominence-bank-web.onrender.com"
      - key: DEBUG
        value: "0"
      - key: OTP_BACKEND
        value: console
      - key: DEMO_MODE
        value: "1"
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: >
      bash -c "python manage.py migrate --noinput &&
      python manage.py seed_demo --no-input 2>/dev/null;
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  - type: web
    name: prominence-bank-web
    plan: free
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://prominence-bank-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
